intent_id: "ERR-001"
schema_version: "1.0.0"
semantic_domain: "observational"
description: "LLM 对话产品通用错误状态语义规范"

component_spec:
  component: "Alert"
  component_library: "Ant Design"
  props_reference:
    - type: "success / info / warning / error"
    - message: "string"
    - description: "string"
    - icon: "ReactNode"

semantic_tokens:
  error_severity:
    fatal:
      description: "流式输出中断，对话上下文可能丢失"
      trigger_keywords: ["stream interrupted", "message stream", "连接断开", "输出中断", "interrupted", "context lost", "会话丢失"]
      visual_mapping:
        color_token: "status.critical"
        motion_token: "pulse.red.urgent"
        icon_token: "alert.octagon"
        background: "red.500/10"
      user_action:
        - label: "刷新页面"
          action: "refresh"
          priority: 1
        - label: "导出历史"
          action: "export_history"
          priority: 2
      llm_constraints:
        - "必须明确告知用户对话上下文可能已丢失"
        - "禁止仅显示'出错了'等模糊文案"
        - "必须提供明确的恢复路径"

    transient:
      description: "网络层故障，系统可自动恢复"
      trigger_keywords: ["network", "网络错误", "network error", "加载失败", "connection lost", "连接失败", "超时"]
      visual_mapping:
        color_token: "status.neutral"
        motion_token: "spinner"
        icon_token: "loader"
        background: "neutral.800"
      user_action:
        - label: "等待自动恢复"
          action: "wait"
          priority: 1
        - label: "手动重试"
          action: "retry"
          priority: 2
      llm_constraints:
        - "必须显示自动重试进度"
        - "禁止使用红色背景（避免情绪过载）"
        - "必须说明预计恢复时间"

    retryable:
      description: "限流/流控，用户可自助恢复"
      trigger_keywords: ["too many", "429", "throttling", "请求过于频繁", "服务繁忙", "限流", "rate limit", "quota", "额度"]
      visual_mapping:
        color_token: "status.warning"
        motion_token: "none"
        icon_token: "clock"
        background: "amber.500/10"
      user_action:
        - label: "等待倒计时"
          action: "wait_countdown"
          countdown_field: "retry_after"
          priority: 1
        - label: "升级套餐"
          action: "upgrade"
          priority: 2
      llm_constraints:
        - "必须显示剩余等待时间（秒/分钟）"
        - "必须提供升级/扩容路径"
        - "禁止使用红色（避免用户恐慌）"

    degraded:
      description: "服务端兜底，部分功能可用"
      trigger_keywords: ["something went wrong", "something wrong", "创造失败", "服务异常", "部分失败", "degraded", "部分可用"]
      visual_mapping:
        color_token: "status.info"
        motion_token: "none"
        icon_token: "info.circle"
        background: "blue.500/10"
      user_action:
        - label: "继续生成"
          action: "continue"
          priority: 1
        - label: "简化问题重试"
          action: "retry_simplified"
          priority: 2
      llm_constraints:
        - "必须说明哪些功能仍然可用"
        - "必须提供替代方案（如简化问题）"
        - "禁止显示纯技术错误码（如 500 Internal Error）"

immutable_boundaries:
  - boundary_type: "safety"
    rule: "禁止把多种错误做成同一种颜色"
    violation_action: "block"
  - boundary_type: "safety"
    rule: "禁止仅显示'出错了'等模糊文案"
    violation_action: "block"
  - boundary_type: "safety"
    rule: "禁止不提供用户下一步行动"
    violation_action: "block"

applicable_products:
  - "ChatGPT"
  - "文心一言"
  - "通义千问"
  - "Kimi"
  - "豆包"
  - "DeepSeek"
  - "讯飞星火"

version_history:
  - version: "1.0.0"
    date: "2026-06-23"
    change: "初始发布，覆盖四种错误状态语义分级"
